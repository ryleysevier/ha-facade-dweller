<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>PAD Eye Preview</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #1a1a2e; color: #eee; font-family: -apple-system, sans-serif; display: flex; height: 100vh; }
  #sidebar {
    width: 320px; padding: 16px; overflow-y: auto; background: #16213e;
    display: flex; flex-direction: column; gap: 12px;
  }
  #sidebar h2 { font-size: 14px; color: #888; text-transform: uppercase; letter-spacing: 1px; margin-top: 8px; }
  .slider-group { display: flex; flex-direction: column; gap: 2px; }
  .slider-group label { font-size: 13px; display: flex; justify-content: space-between; }
  .slider-group input[type=range] { width: 100%; accent-color: #e94560; }
  #main { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 20px; }
  canvas { border-radius: 50%; box-shadow: 0 0 40px rgba(233,69,96,0.2); }
  #mood-name { font-size: 24px; font-weight: 600; }
  #mood-list {
    display: flex; flex-wrap: wrap; gap: 4px; max-height: 300px; overflow-y: auto;
  }
  .mood-btn {
    padding: 4px 8px; font-size: 11px; border: 1px solid #333; border-radius: 4px;
    background: #1a1a2e; color: #ccc; cursor: pointer; transition: all 0.15s;
  }
  .mood-btn:hover { background: #e94560; color: #fff; border-color: #e94560; }
  .mood-btn.active { background: #e94560; color: #fff; border-color: #e94560; }
  #pad-display { font-size: 12px; color: #666; font-family: monospace; }
</style>
</head>
<body>

<div id="sidebar">
  <h2>PAD Controls</h2>
  <div class="slider-group">
    <label>Pleasure <span id="pVal">0</span></label>
    <input type="range" id="pleasure" min="-100" max="100" value="0">
  </div>
  <div class="slider-group">
    <label>Arousal <span id="aVal">0</span></label>
    <input type="range" id="arousal" min="-100" max="100" value="0">
  </div>
  <div class="slider-group">
    <label>Dominance <span id="dVal">0</span></label>
    <input type="range" id="dominance" min="-100" max="100" value="0">
  </div>
  <div id="pad-display"></div>

  <h2>Presets</h2>
  <div id="mood-list"></div>
</div>

<div id="main">
  <div id="mood-name">neutral</div>
  <canvas id="eye" width="240" height="240"></canvas>
</div>

// --- PAD → Eye Params (mirrors C++ logic) ---
function padToEye(p, a, d) {
  p = Math.max(-1, Math.min(1, p));
  a = Math.max(-1, Math.min(1, a));
  d = Math.max(-1, Math.min(1, d));

  const baseSize = 130;
  let width = baseSize + a * 25 + p * 10 + d * 10;
  let height = baseSize + a * 30 + p * 15;

  let roundness = 0.6 + p * 0.3 - (a > 0 && p < 0 ? 0.2 : 0);
  roundness = Math.max(0.2, Math.min(1, roundness));

  let openness = 0.7 + a * 0.25;
  if (a < -0.5) openness -= 0.15;
  openness = Math.max(0.15, Math.min(1, openness));

  let pupilSize = 0.35 + a * 0.15 + p * 0.05;
  pupilSize = Math.max(0.15, Math.min(0.6, pupilSize));

  let gazeX = 0, gazeY = d * -0.15;
  if (d < -0.3) gazeX = -0.2;

  let lidTop = 0;
  if (a < 0) lidTop = Math.abs(a) * 0.4;
  if (p < -0.3 && a > 0.3) lidTop = 0.2;

  let lidBottom = 0;
  if (p > 0.3) lidBottom = p * 0.35;
  if (a > 0.7 && p >= 0) lidBottom = 0;

  let lidAngle = 0;
  if (p < -0.3 && a > 0.3) lidAngle = -0.5 - p * 0.3;
  if (p < 0 && a < -0.3) lidAngle = 0.3 + Math.abs(a) * 0.2;
  if (d > 0.5 && p < 0) lidAngle -= 0.2;
  lidAngle = Math.max(-1, Math.min(1, lidAngle));

  let hue;
  if (p > 0.3 && a > 0.3) hue = 40;
  else if (p > 0.3) hue = 30;
  else if (p < -0.3 && a > 0.3 && d > 0) hue = 5;
  else if (p < -0.3 && a > 0.3) hue = 280;
  else if (p < -0.3 && a <= 0) hue = 220;
  else if (a < -0.3) hue = 180;
  else hue = 35;

  let sat = 0.6 + Math.abs(a) * 0.3;
  if (p < -0.5 && d < -0.3) sat -= 0.2;
  sat = Math.max(0.3, Math.min(1, sat));

  let bri = 0.7 + p * 0.2;
  bri = Math.max(0.4, Math.min(1, bri));

  let glow = Math.abs(a) * 0.5 + (p > 0 ? p * 0.3 : 0);
  glow = Math.max(0, Math.min(0.8, glow));

  // Brows
  let browHeight = 0.3 + a * 0.3;
  if (p < -0.3 && a > 0.3 && d > 0) browHeight = -0.2;
  if (p < -0.5 && d < -0.3) browHeight = 0.7;
  browHeight = Math.max(-0.5, Math.min(1, browHeight));

  let browAngle = 0;
  if (p < -0.3 && a > 0.3) browAngle = -0.6 - d * 0.3;
  if (p < -0.3 && d < -0.3) browAngle = 0.5 + Math.abs(d) * 0.3;
  if (p < -0.3 && a < -0.3) browAngle = 0.3;
  if (p > 0.5) browAngle = 0.1;
  browAngle = Math.max(-1, Math.min(1, browAngle));

  let browThickness = 0.5 + d * 0.2;
  if (p < -0.3 && a > 0.5) browThickness = 0.8;
  browThickness = Math.max(0.3, Math.min(1, browThickness));

  let browCurve = a * 0.6 + p * 0.2;
  if (a > 0.7) browCurve = 0.8;
  if (a < -0.5) browCurve = -0.4;
  browCurve = Math.max(-1, Math.min(1, browCurve));

  return { width, height, roundness, openness, pupilSize, gazeX, gazeY,
           lidTop, lidBottom, lidAngle, hue, sat, bri, glow,
           browHeight, browAngle, browThickness, browCurve };
}

function hsvToRgb(h, s, v) {
  let c = v * s, x = c * (1 - Math.abs((h / 60) % 2 - 1)), m = v - c;
  let r, g, b;
  if (h < 60) [r,g,b] = [c,x,0];
  else if (h < 120) [r,g,b] = [x,c,0];
  else if (h < 180) [r,g,b] = [0,c,x];
  else if (h < 240) [r,g,b] = [0,x,c];
  else if (h < 300) [r,g,b] = [x,0,c];
  else [r,g,b] = [c,0,x];
  return `rgb(${Math.round((r+m)*255)},${Math.round((g+m)*255)},${Math.round((b+m)*255)})`;
}

// --- Animation state ---
let currentEye = padToEye(0, 0, 0);
let targetEye = padToEye(0, 0, 0);
let tweenT = 1;
let blinkPhase = 0, isBlinking = false, blinkTimer = 3;
let saccadeX = 0, saccadeY = 0, saccadeTimer = 0;
let gazeX = 0, gazeY = 0, gazeTargetX = 0, gazeTargetY = 0, gazeTimer = 0;
let breathPhase = 0;
let lastTime = performance.now();

function lerpObj(a, b, t) {
  let out = {};
  for (let k in a) out[k] = a[k] + (b[k] - a[k]) * t;
  return out;
}

function easeInOut(t) { return t < 0.5 ? 2*t*t : 1 - Math.pow(-2*t+2,2)/2; }
function easeIn(t) { return t * t; }
function easeOut(t) { return 1 - (1-t)*(1-t); }

const canvas = document.getElementById('eye');
const ctx = canvas.getContext('2d');

function render() {
  const now = performance.now();
  const dt = Math.min((now - lastTime) / 1000, 0.1);
  lastTime = now;

  // Tween
  if (tweenT < 1) {
    tweenT += dt * 1.5;
    if (tweenT > 1) tweenT = 1;
  }
  let e = lerpObj(currentEye, targetEye, easeInOut(tweenT));
  if (tweenT >= 1) currentEye = {...targetEye};

  // Blink
  blinkTimer -= dt;
  if (blinkTimer <= 0 && !isBlinking) { isBlinking = true; blinkPhase = 0; }
  if (isBlinking) {
    blinkPhase += dt * 6;
    if (blinkPhase >= 2) { isBlinking = false; blinkPhase = 0; blinkTimer = 3 + Math.random() * 2; }
  }
  let bf = 0;
  if (isBlinking) {
    if (blinkPhase < 0.15) bf = easeIn(blinkPhase/0.15) * 0.1;
    else if (blinkPhase < 1) bf = 0.1 + easeIn((blinkPhase-0.15)/0.85) * 0.9;
    else bf = 1 - easeOut(blinkPhase - 1);
  }

  // Saccade
  saccadeTimer -= dt;
  if (saccadeTimer <= 0) {
    saccadeX = (Math.random()*2-1) * e.glow * 4;
    saccadeY = (Math.random()*2-1) * e.glow * 3;
    saccadeTimer = 0.08 + Math.random() * 0.2;
  }

  // Gaze drift
  gazeTimer -= dt;
  if (gazeTimer <= 0) {
    gazeTargetX = e.gazeX + (Math.random()*2-1)*0.15;
    gazeTargetY = e.gazeY + (Math.random()*2-1)*0.1;
    gazeTimer = 1 + Math.random() * 2;
  }
  gazeX += (gazeTargetX - gazeX) * dt * 3;
  gazeY += (gazeTargetY - gazeY) * dt * 3;

  // Breathing
  breathPhase += dt * 1.5;
  let breathScale = 1 + Math.sin(breathPhase) * 0.015;

  // Geometry
  const gap = 12;
  let eyeW = e.width * 0.42 * breathScale;
  let eyeH = e.height * 0.55 * e.openness * breathScale * (1 - bf);
  eyeH = Math.max(3, eyeH);
  let rr = e.roundness * Math.min(eyeW, eyeH) * 0.5;

  const cxc = 120, cyc = 120;
  const lcx = cxc - gap/2 - eyeW/2;
  const rcx = cxc + gap/2 + eyeW/2;

  // Colors
  const eyeCol = hsvToRgb(e.hue, e.sat, e.bri);
  const bgCol = hsvToRgb(e.hue, e.sat * 0.15, 0.05);
  const glowCol = hsvToRgb(e.hue, e.sat * 0.6, e.bri * 0.3 * e.glow);

  // Clear
  ctx.fillStyle = bgCol;
  ctx.fillRect(0, 0, 240, 240);

  // Circular clip
  ctx.save();
  ctx.beginPath();
  ctx.arc(120, 120, 118, 0, Math.PI * 2);
  ctx.clip();

  // Glow
  if (e.glow > 0.05) {
    let gr = e.glow * 50 + eyeW * 0.5;
    let grad = ctx.createRadialGradient(cxc, cyc, 0, cxc, cyc, gr);
    grad.addColorStop(0, glowCol);
    grad.addColorStop(1, bgCol);
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, 240, 240);
  }

  // Draw both eyes
  for (let side = 0; side < 2; side++) {
    let ecx = side === 0 ? lcx : rcx;
    let mirror = side === 0 ? 1 : -1;
    let ex = ecx - eyeW/2;
    let ey = cyc - eyeH/2;

    // Eye body
    ctx.fillStyle = eyeCol;
    ctx.beginPath();
    ctx.roundRect(ex, ey, eyeW, eyeH, rr);
    ctx.fill();

    // Pupil
    if (eyeH > 8) {
      let pupR = e.pupilSize * Math.min(eyeW, eyeH) * 0.45;
      pupR = Math.max(4, pupR);
      let mgx = eyeW * 0.5 - pupR - 3;
      let mgy = eyeH * 0.5 - pupR - 3;
      let px = ecx + (gazeX + saccadeX/15) * mgx;
      let py = cyc + (gazeY + saccadeY/15) * mgy;

      ctx.fillStyle = bgCol;
      ctx.beginPath(); ctx.arc(px, py, pupR, 0, Math.PI*2); ctx.fill();

      ctx.fillStyle = '#000';
      ctx.beginPath(); ctx.arc(px, py, Math.max(2, pupR*0.4), 0, Math.PI*2); ctx.fill();

      ctx.fillStyle = '#fff';
      ctx.beginPath(); ctx.arc(px - pupR*0.25, py - pupR*0.25, Math.max(1, pupR*0.22), 0, Math.PI*2); ctx.fill();
    }

    // Top lid
    let angleOff = e.lidAngle * mirror;
    if (e.lidTop > 0.01 || Math.abs(angleOff) > 0.01) {
      let droopPx = e.lidTop * eyeH * 0.6;
      let anglePx = angleOff * eyeW * 0.3;
      ctx.fillStyle = bgCol;
      ctx.beginPath();
      ctx.moveTo(ex - 6, ey - 6);
      ctx.lineTo(ex + eyeW + 6, ey - 6);
      ctx.lineTo(ex + eyeW + 6 - anglePx, ey + droopPx);
      ctx.lineTo(ex - 6 + anglePx, ey + droopPx);
      ctx.fill();
    }

    // Bottom lid
    if (e.lidBottom > 0.01) {
      let raisePx = e.lidBottom * eyeH * 0.5;
      let eyeBot = ey + eyeH;
      ctx.fillStyle = bgCol;
      ctx.beginPath();
      ctx.moveTo(ex - 6, eyeBot + 6);
      ctx.lineTo(ex + eyeW + 6, eyeBot + 6);
      ctx.lineTo(ecx, eyeBot - raisePx);
      ctx.fill();
    }

    // Eyebrow — curved, can cut into eye space
    {
      let browW = eyeW * 1.1;
      let browH = 6 + e.browThickness * 10;
      let browBaseY = ey - 4 - e.browHeight * eyeH * 0.4;
      let rawAnglePx = e.browAngle * eyeW * 0.2;
      let curveAmt = e.browCurve * eyeH * 0.25;

      let bx = ecx - browW / 2;

      ctx.fillStyle = hsvToRgb(e.hue, e.sat * 0.4, e.bri * 0.35);

      // Build top and bottom edges of curved brow as paths
      let topPoints = [];
      let botPoints = [];
      let steps = 20;
      for (let i = 0; i <= steps; i++) {
        let t = i / steps;
        let sx = bx + t * browW;
        let angleT = (side === 0) ? (1 - t) : t;
        let angleY = rawAnglePx * (1 - 2 * angleT);
        let curveY = -curveAmt * 4 * (t - 0.5) * (t - 0.5) + curveAmt;
        let finalY = browBaseY + angleY - curveY;
        topPoints.push([sx, finalY]);
        botPoints.push([sx, finalY + browH]);
      }

      ctx.beginPath();
      ctx.moveTo(topPoints[0][0], topPoints[0][1]);
      for (let i = 1; i < topPoints.length; i++) ctx.lineTo(topPoints[i][0], topPoints[i][1]);
      for (let i = botPoints.length - 1; i >= 0; i--) ctx.lineTo(botPoints[i][0], botPoints[i][1]);
      ctx.closePath();
      ctx.fill();
    }
  }

  ctx.restore();

  requestAnimationFrame(render);
}

// --- UI ---
const pSlider = document.getElementById('pleasure');
const aSlider = document.getElementById('arousal');
const dSlider = document.getElementById('dominance');
const nameEl = document.getElementById('mood-name');
const padEl = document.getElementById('pad-display');

function updateFromSliders() {
  const p = pSlider.value / 100, a = aSlider.value / 100, d = dSlider.value / 100;
  document.getElementById('pVal').textContent = pSlider.value;
  document.getElementById('aVal').textContent = aSlider.value;
  document.getElementById('dVal').textContent = dSlider.value;
  padEl.textContent = `P:${p.toFixed(2)} A:${a.toFixed(2)} D:${d.toFixed(2)}`;
  targetEye = padToEye(p, a, d);
  tweenT = 0;
  // Clear active mood button
  document.querySelectorAll('.mood-btn.active').forEach(b => b.classList.remove('active'));
}

pSlider.addEventListener('input', () => { updateFromSliders(); nameEl.textContent = 'custom'; });
aSlider.addEventListener('input', () => { updateFromSliders(); nameEl.textContent = 'custom'; });
dSlider.addEventListener('input', () => { updateFromSliders(); nameEl.textContent = 'custom'; });

// Build mood buttons
const listEl = document.getElementById('mood-list');
MOODS.forEach(([name, p, a, d], i) => {
  const btn = document.createElement('button');
  btn.className = 'mood-btn';
  btn.textContent = name;
  btn.addEventListener('click', () => {
    pSlider.value = p; aSlider.value = a; dSlider.value = d;
    updateFromSliders();
    nameEl.textContent = name;
    document.querySelectorAll('.mood-btn.active').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
  });
  listEl.appendChild(btn);
});

// Start
updateFromSliders();
requestAnimationFrame(render);
</script>
</body>
</html>
