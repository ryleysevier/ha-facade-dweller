<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>PAD Eye Preview</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #1a1a2e; color: #eee; font-family: -apple-system, sans-serif; display: flex; height: 100vh; }
  #sidebar {
    width: 320px; padding: 16px; overflow-y: auto; background: #16213e;
    display: flex; flex-direction: column; gap: 12px;
  }
  #sidebar h2 { font-size: 14px; color: #888; text-transform: uppercase; letter-spacing: 1px; margin-top: 8px; }
  .slider-group { display: flex; flex-direction: column; gap: 2px; }
  .slider-group label { font-size: 13px; display: flex; justify-content: space-between; }
  .slider-group input[type=range] { width: 100%; accent-color: #e94560; }
  #main { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 20px; }
  canvas { border-radius: 50%; box-shadow: 0 0 40px rgba(233,69,96,0.2); }
  #mood-name { font-size: 24px; font-weight: 600; }
  #mood-list {
    display: flex; flex-wrap: wrap; gap: 4px; max-height: 300px; overflow-y: auto;
  }
  #nav-hint { font-size: 11px; color: #555; margin-top: 4px; }
  #mood-counter { font-size: 14px; color: #888; font-family: monospace; }
  .mood-btn.has-emoji { border-color: #e94560; }
  .mood-btn {
    padding: 4px 8px; font-size: 11px; border: 1px solid #333; border-radius: 4px;
    background: #1a1a2e; color: #ccc; cursor: pointer; transition: all 0.15s;
  }
  .mood-btn:hover { background: #e94560; color: #fff; border-color: #e94560; }
  .mood-btn.active { background: #e94560; color: #fff; border-color: #e94560; }
  #pad-display { font-size: 12px; color: #666; font-family: monospace; }
</style>
</head>
<body>

<div id="sidebar">
  <h2>PAD Controls</h2>
  <div class="slider-group">
    <label>Pleasure <span id="pVal">0</span></label>
    <input type="range" id="pleasure" min="-100" max="100" value="0">
  </div>
  <div class="slider-group">
    <label>Arousal <span id="aVal">0</span></label>
    <input type="range" id="arousal" min="-100" max="100" value="0">
  </div>
  <div class="slider-group">
    <label>Dominance <span id="dVal">0</span></label>
    <input type="range" id="dominance" min="-100" max="100" value="0">
  </div>
  <div id="pad-display"></div>

  <h2>Presets</h2>
  <div id="mood-list"></div>
</div>

<div id="main">
  <div id="mood-counter">0 / 200</div>
  <div id="mood-name">neutral</div>
  <canvas id="eye" width="240" height="240"></canvas>
  <div id="nav-hint">← → arrow keys to step &nbsp;|&nbsp; Space = autoplay &nbsp;|&nbsp; Click any preset</div>

// --- PAD → Eye Params (mirrors C++ logic) ---
function padToEye(p, a, d) {
  p = Math.max(-1, Math.min(1, p));
  a = Math.max(-1, Math.min(1, a));
  d = Math.max(-1, Math.min(1, d));

  const baseSize = 130;
  let height = baseSize + a * 35 + p * 10;
  let width = baseSize + a * 15 + p * 10 + d * 10;
  if (p < -0.3 && a > 0.3 && d > 0) { width += 20; height -= 30; }
  if (p < -0.3 && a > 0.3 && d < -0.3) { height += 20; width -= 10; }

  let roundness = 0.65 + p * 0.25;
  if (p < -0.3 && a > 0.3) roundness = 0.2;
  if (a > 0.7 && p >= 0) roundness = 0.95;
  if (p > 0.5) roundness = 0.85;
  roundness = Math.max(0.15, Math.min(1, roundness));

  let openness = 0.7 + a * 0.25;
  if (a < -0.5) openness -= 0.2;
  if (p < -0.3 && a > 0.3 && d > 0) openness = 0.5;
  if (a > 0.8) openness = 1.0;
  openness = Math.max(0.12, Math.min(1, openness));

  let pupilSize = 0.35 + p * 0.08;
  if (p > 0.5) pupilSize = 0.5;
  if (p < -0.3 && a > 0.5 && d < 0) pupilSize = 0.18;
  if (p < -0.3 && a > 0.3 && d > 0) pupilSize = 0.22;
  if (a > 0.7 && p >= 0) pupilSize = 0.25;
  pupilSize = Math.max(0.12, Math.min(0.6, pupilSize));

  let gazeX = 0, gazeY = d * -0.15;
  if (d < -0.3) gazeX = -0.2;

  let lidTop = 0;
  if (a < 0) lidTop = Math.abs(a) * 0.5;
  if (p < -0.3 && a > 0.3) lidTop = 0.45;

  let lidBottom = 0;
  if (p > 0.3) lidBottom = p * 0.4;
  if (a > 0.7 && p >= 0) lidBottom = 0;

  let lidAngle = 0;
  if (p < -0.3 && a > 0.3) lidAngle = -0.6 - p * 0.3;
  if (p < 0 && a < -0.3) lidAngle = 0.4 + Math.abs(a) * 0.2;
  if (d > 0.5 && p < 0) lidAngle -= 0.2;
  lidAngle = Math.max(-1, Math.min(1, lidAngle));

  let hue;
  if (p > 0.3 && a > 0.3) hue = 40;
  else if (p > 0.3) hue = 30;
  else if (p < -0.3 && a > 0.3 && d > 0) hue = 5;
  else if (p < -0.3 && a > 0.3) hue = 280;
  else if (p < -0.3 && a <= 0) hue = 220;
  else if (a < -0.3) hue = 180;
  else hue = 35;

  let sat = 0.6 + Math.abs(a) * 0.3;
  if (p < -0.5 && d < -0.3) sat -= 0.2;
  sat = Math.max(0.3, Math.min(1, sat));

  let bri = 0.7 + p * 0.2;
  bri = Math.max(0.4, Math.min(1, bri));

  let glow = Math.abs(a) * 0.5 + (p > 0 ? p * 0.3 : 0);
  glow = Math.max(0, Math.min(0.8, glow));

  // Brows
  let browHeight = 0.3 + a * 0.3;
  if (p < -0.3 && a > 0.3 && d > 0) browHeight = -0.2;
  if (p < -0.5 && d < -0.3) browHeight = 0.7;
  browHeight = Math.max(-0.5, Math.min(1, browHeight));

  let browAngle = 0;
  if (p < -0.3 && a > 0.3) browAngle = -0.6 - d * 0.3;
  if (p < -0.3 && d < -0.3) browAngle = 0.5 + Math.abs(d) * 0.3;
  if (p < -0.3 && a < -0.3) browAngle = 0.3;
  if (p > 0.5) browAngle = 0.1;
  browAngle = Math.max(-1, Math.min(1, browAngle));

  let browThickness = 0.5 + d * 0.2;
  if (p < -0.3 && a > 0.5) browThickness = 0.8;
  browThickness = Math.max(0.3, Math.min(1, browThickness));

  let browCurve = a * 0.6 + p * 0.2;
  if (a > 0.7) browCurve = 0.8;
  if (a < -0.5) browCurve = -0.4;
  browCurve = Math.max(-1, Math.min(1, browCurve));

  return { width, height, roundness, openness, pupilSize, gazeX, gazeY,
           lidTop, lidBottom, lidAngle, hue, sat, bri, glow,
           browHeight, browAngle, browThickness, browCurve };
}

function hsvToRgb(h, s, v) {
  let c = v * s, x = c * (1 - Math.abs((h / 60) % 2 - 1)), m = v - c;
  let r, g, b;
  if (h < 60) [r,g,b] = [c,x,0];
  else if (h < 120) [r,g,b] = [x,c,0];
  else if (h < 180) [r,g,b] = [0,c,x];
  else if (h < 240) [r,g,b] = [0,x,c];
  else if (h < 300) [r,g,b] = [x,0,c];
  else [r,g,b] = [c,0,x];
  return `rgb(${Math.round((r+m)*255)},${Math.round((g+m)*255)},${Math.round((b+m)*255)})`;
}

let activeMoodIdx = -1;

// --- Animation state ---
let currentEye = padToEye(0, 0, 0);
let targetEye = padToEye(0, 0, 0);
let tweenT = 1;
let blinkPhase = 0, isBlinking = false, blinkTimer = 3;
let saccadeX = 0, saccadeY = 0, saccadeTimer = 0;
let gazeX = 0, gazeY = 0, gazeTargetX = 0, gazeTargetY = 0, gazeTimer = 0;
let breathPhase = 0;
let lastTime = performance.now();

function lerpObj(a, b, t) {
  let out = {};
  for (let k in a) out[k] = a[k] + (b[k] - a[k]) * t;
  return out;
}

function easeInOut(t) { return t < 0.5 ? 2*t*t : 1 - Math.pow(-2*t+2,2)/2; }
function easeIn(t) { return t * t; }
function easeOut(t) { return 1 - (1-t)*(1-t); }

const canvas = document.getElementById('eye');
const ctx = canvas.getContext('2d');

function render() {
  const now = performance.now();
  const dt = Math.min((now - lastTime) / 1000, 0.1);
  lastTime = now;

  // Tween
  if (tweenT < 1) {
    tweenT += dt * 1.5;
    if (tweenT > 1) tweenT = 1;
  }
  let e = lerpObj(currentEye, targetEye, easeInOut(tweenT));
  if (tweenT >= 1) currentEye = {...targetEye};

  // Blink
  blinkTimer -= dt;
  if (blinkTimer <= 0 && !isBlinking) { isBlinking = true; blinkPhase = 0; }
  if (isBlinking) {
    blinkPhase += dt * 6;
    if (blinkPhase >= 2) { isBlinking = false; blinkPhase = 0; blinkTimer = 3 + Math.random() * 2; }
  }
  let bf = 0;
  if (isBlinking) {
    if (blinkPhase < 0.15) bf = easeIn(blinkPhase/0.15) * 0.1;
    else if (blinkPhase < 1) bf = 0.1 + easeIn((blinkPhase-0.15)/0.85) * 0.9;
    else bf = 1 - easeOut(blinkPhase - 1);
  }

  // Saccade
  saccadeTimer -= dt;
  if (saccadeTimer <= 0) {
    saccadeX = (Math.random()*2-1) * e.glow * 4;
    saccadeY = (Math.random()*2-1) * e.glow * 3;
    saccadeTimer = 0.08 + Math.random() * 0.2;
  }

  // Gaze drift
  gazeTimer -= dt;
  if (gazeTimer <= 0) {
    gazeTargetX = e.gazeX + (Math.random()*2-1)*0.15;
    gazeTargetY = e.gazeY + (Math.random()*2-1)*0.1;
    gazeTimer = 1 + Math.random() * 2;
  }
  gazeX += (gazeTargetX - gazeX) * dt * 3;
  gazeY += (gazeTargetY - gazeY) * dt * 3;

  // Breathing
  breathPhase += dt * 1.5;
  let breathScale = 1 + Math.sin(breathPhase) * 0.015;

  // Geometry
  const gap = 12;
  let eyeW = e.width * 0.42 * breathScale;
  let eyeH = e.height * 0.55 * e.openness * breathScale * (1 - bf);
  eyeH = Math.max(3, eyeH);
  let rr = e.roundness * Math.min(eyeW, eyeH) * 0.5;

  const cxc = 120, cyc = 120;
  const lcx = cxc - gap/2 - eyeW/2;
  const rcx = cxc + gap/2 + eyeW/2;

  // Colors
  const eyeCol = hsvToRgb(e.hue, e.sat, e.bri);
  const bgCol = hsvToRgb(e.hue, e.sat * 0.15, 0.05);
  const glowCol = hsvToRgb(e.hue, e.sat * 0.6, e.bri * 0.3 * e.glow);

  // Clear
  ctx.fillStyle = bgCol;
  ctx.fillRect(0, 0, 240, 240);

  // Circular clip
  ctx.save();
  ctx.beginPath();
  ctx.arc(120, 120, 118, 0, Math.PI * 2);
  ctx.clip();

  // Glow
  if (e.glow > 0.05) {
    let gr = e.glow * 50 + eyeW * 0.5;
    let grad = ctx.createRadialGradient(cxc, cyc, 0, cxc, cyc, gr);
    grad.addColorStop(0, glowCol);
    grad.addColorStop(1, bgCol);
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, 240, 240);
  }

  // Draw both eyes
  for (let side = 0; side < 2; side++) {
    let ecx = side === 0 ? lcx : rcx;
    let mirror = side === 0 ? 1 : -1;
    let ex = ecx - eyeW/2;
    let ey = cyc - eyeH/2;

    // Eye body
    ctx.fillStyle = eyeCol;
    ctx.beginPath();
    ctx.roundRect(ex, ey, eyeW, eyeH, rr);
    ctx.fill();

    // Pupil (skip if emoji replaces it)
    let isPupilReplaced = activeMoodIdx >= 0 && EMOJI_MAP[activeMoodIdx] && EMOJI_MAP[activeMoodIdx].pattern === 'pupil_replace';
    if (eyeH > 8 && !isPupilReplaced) {
      let pupR = e.pupilSize * Math.min(eyeW, eyeH) * 0.45;
      pupR = Math.max(4, pupR);
      let mgx = eyeW * 0.5 - pupR - 3;
      let mgy = eyeH * 0.5 - pupR - 3;
      let px = ecx + (gazeX + saccadeX/15) * mgx;
      let py = cyc + (gazeY + saccadeY/15) * mgy;

      ctx.fillStyle = bgCol;
      ctx.beginPath(); ctx.arc(px, py, pupR, 0, Math.PI*2); ctx.fill();

      ctx.fillStyle = '#000';
      ctx.beginPath(); ctx.arc(px, py, Math.max(2, pupR*0.4), 0, Math.PI*2); ctx.fill();

      ctx.fillStyle = '#fff';
      ctx.beginPath(); ctx.arc(px - pupR*0.25, py - pupR*0.25, Math.max(1, pupR*0.22), 0, Math.PI*2); ctx.fill();
    }

    // Top lid: angry (lidAngle negative) = inner corners come DOWN
    if (e.lidTop > 0.01 || Math.abs(e.lidAngle) > 0.01) {
      let droopPx = e.lidTop * eyeH * 0.6;
      let rawLidAnglePx = e.lidAngle * eyeW * 0.3;
      let innerX = (side === 0) ? ex + eyeW + 6 : ex - 6;
      let outerX = (side === 0) ? ex - 6 : ex + eyeW + 6;
      let innerDroop = droopPx + (-rawLidAnglePx);
      let outerDroop = droopPx + rawLidAnglePx;
      ctx.fillStyle = bgCol;
      ctx.beginPath();
      ctx.moveTo(innerX, ey - 6);
      ctx.lineTo(outerX, ey - 6);
      ctx.lineTo(outerX, ey + Math.max(0, outerDroop));
      ctx.lineTo(innerX, ey + Math.max(0, innerDroop));
      ctx.fill();
    }

    // Bottom lid
    if (e.lidBottom > 0.01) {
      let raisePx = e.lidBottom * eyeH * 0.5;
      let eyeBot = ey + eyeH;
      ctx.fillStyle = bgCol;
      ctx.beginPath();
      ctx.moveTo(ex - 6, eyeBot + 6);
      ctx.lineTo(ex + eyeW + 6, eyeBot + 6);
      ctx.lineTo(ecx, eyeBot - raisePx);
      ctx.fill();
    }

    // Eyebrow (disabled for now)
  }

  // --- Emoji effects ---
  if (activeMoodIdx >= 0 && EMOJI_MAP[activeMoodIdx]) {
    const fx = EMOJI_MAP[activeMoodIdx];
    const emojiPhase = performance.now() / 1000;
    const pupLx = lcx + gazeX * eyeW * 0.15;
    const pupRx = rcx + gazeX * eyeW * 0.15;
    const pupY = cyc + gazeY * eyeH * 0.15;

    ctx.font = `${fx.size || 16}px serif`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';

    if (fx.pattern === 'pupil_replace' && eyeH > 10) {
      ctx.font = `${Math.max(10, eyeH * 0.4)}px serif`;
      ctx.fillText(fx.emoji, pupLx, pupY);
      ctx.fillText(fx.emoji, pupRx, pupY);
    }
    else if (fx.pattern === 'float_above') {
      let bobY = Math.sin(emojiPhase * 2) * 5;
      let driftX = Math.sin(emojiPhase * 0.7) * 8;
      ctx.font = '24px serif';
      ctx.fillText(fx.emoji, cxc + driftX + 15, cyc - eyeH * 0.35 - 20 + bobY);
      ctx.font = '14px serif';
      ctx.fillText(fx.emoji, cxc + driftX - 10, cyc - eyeH * 0.35 - 12 + bobY);
    }
    else if (fx.pattern === 'rain_down') {
      if (!fx._particles) {
        fx._particles = [];
        for (let i = 0; i < 6; i++) fx._particles.push({x: 30 + Math.random()*180, y: Math.random()*-40});
      }
      ctx.font = '12px serif';
      for (let p of fx._particles) {
        p.y += 1.5;
        if (p.y > 250) { p.y = -20; p.x = 30 + Math.random()*180; }
        ctx.fillText(fx.emoji, p.x, p.y);
      }
      if (fx.emoji2) {
        ctx.font = '28px serif';
        ctx.fillText(fx.emoji2, cxc, 28);
      }
    }
    else if (fx.pattern === 'orbit') {
      for (let i = 0; i < 3; i++) {
        let angle = emojiPhase * 2 + i * (Math.PI * 2 / 3);
        let ox = cxc + Math.cos(angle) * 70;
        let oy = cyc + Math.sin(angle) * 50;
        ctx.fillText(fx.emoji, ox, oy);
      }
    }
    else if (fx.pattern === 'eye_sparkle') {
      let sparkle = (Math.sin(emojiPhase * 5) + 1) * 0.5;
      if (sparkle > 0.6) {
        ctx.font = '10px serif';
        ctx.fillText(fx.emoji, pupLx - 5, pupY - 8);
        ctx.fillText(fx.emoji, pupRx - 5, pupY - 8);
      }
    }
    else if (fx.pattern === 'bottom_status') {
      let bobY = Math.sin(emojiPhase * 1.5) * 2;
      ctx.font = '24px serif';
      ctx.fillText(fx.emoji, cxc, cyc + eyeH * 0.35 + 25 + bobY);
    }
    else if (fx.pattern === 'bg_fill') {
      ctx.font = '12px serif';
      for (let i = 0; i < 6; i++) {
        let ox = Math.sin(emojiPhase * 0.3 + i * 1.5) * 10;
        let oy = Math.cos(emojiPhase * 0.4 + i * 1.2) * 10;
        let bx = 30 + (i % 3) * 80 + ox;
        let by = 30 + Math.floor(i / 3) * 170 + oy;
        ctx.fillText(fx.emoji, bx, by);
      }
    }
    else if (fx.pattern === 'side_peek') {
      let peekX = Math.sin(Math.min(emojiPhase * 2, Math.PI / 2));
      ctx.font = '28px serif';
      ctx.fillText(fx.emoji, 240 - peekX * 35, cyc - 20);
    }
    else if (fx.pattern === 'pulse_center') {
      let pulse = (Math.sin(emojiPhase * 4) + 1) * 0.5;
      let sz = 16 + pulse * 16;
      ctx.font = `${sz}px serif`;
      ctx.fillText(fx.emoji, cxc, cyc - 5);
    }
    else if (fx.pattern === 'tear_drop') {
      let tearY = (emojiPhase * 0.5) % 1.5;
      if (tearY < 1) {
        ctx.font = '10px serif';
        ctx.fillText(fx.emoji, lcx - eyeW * 0.35, cyc + eyeH * 0.25 + tearY * 20);
      }
    }
  }

  ctx.restore();

  requestAnimationFrame(render);
}

// --- UI ---
const pSlider = document.getElementById('pleasure');
const aSlider = document.getElementById('arousal');
const dSlider = document.getElementById('dominance');
const nameEl = document.getElementById('mood-name');
const padEl = document.getElementById('pad-display');

function updateFromSliders() {
  const p = pSlider.value / 100, a = aSlider.value / 100, d = dSlider.value / 100;
  document.getElementById('pVal').textContent = pSlider.value;
  document.getElementById('aVal').textContent = aSlider.value;
  document.getElementById('dVal').textContent = dSlider.value;
  padEl.textContent = `P:${p.toFixed(2)} A:${a.toFixed(2)} D:${d.toFixed(2)}`;
  targetEye = padToEye(p, a, d);
  tweenT = 0;
  // Clear active mood button
  document.querySelectorAll('.mood-btn.active').forEach(b => b.classList.remove('active'));
}

pSlider.addEventListener('input', () => { updateFromSliders(); nameEl.textContent = 'custom'; activeMoodIdx = -1; });
aSlider.addEventListener('input', () => { updateFromSliders(); nameEl.textContent = 'custom'; activeMoodIdx = -1; });
dSlider.addEventListener('input', () => { updateFromSliders(); nameEl.textContent = 'custom'; activeMoodIdx = -1; });

// Moods with emoji effects (matches emoji_fx.cpp getMoodEmoji)
const EMOJI_MOODS = new Set(Object.keys(EMOJI_MAP).map(Number));

// Build mood buttons
const listEl = document.getElementById('mood-list');
const moodBtns = [];
const counterEl = document.getElementById('mood-counter');
let currentMoodIdx = 0;
let autoplayTimer = null;

function selectMood(i) {
  const [name, p, a, d] = MOODS[i];
  currentMoodIdx = i;
  activeMoodIdx = i;
  // Reset rain particles when switching moods
  if (EMOJI_MAP[i] && EMOJI_MAP[i]._particles) delete EMOJI_MAP[i]._particles;
  pSlider.value = p; aSlider.value = a; dSlider.value = d;
  updateFromSliders();
  nameEl.textContent = name + (EMOJI_MOODS.has(i) ? ' ✨' : '');
  counterEl.textContent = `${i} / ${MOODS.length}`;
  document.querySelectorAll('.mood-btn.active').forEach(b => b.classList.remove('active'));
  if (moodBtns[i]) {
    moodBtns[i].classList.add('active');
    moodBtns[i].scrollIntoView({ block: 'nearest' });
  }
}

MOODS.forEach(([name, p, a, d], i) => {
  const btn = document.createElement('button');
  btn.className = 'mood-btn' + (EMOJI_MOODS.has(i) ? ' has-emoji' : '');
  btn.textContent = name;
  btn.addEventListener('click', () => selectMood(i));
  listEl.appendChild(btn);
  moodBtns.push(btn);
});

// Keyboard navigation
document.addEventListener('keydown', (ev) => {
  if (ev.target.tagName === 'INPUT') return; // don't hijack slider input
  if (ev.key === 'ArrowRight' || ev.key === 'ArrowDown') {
    ev.preventDefault();
    selectMood((currentMoodIdx + 1) % MOODS.length);
  } else if (ev.key === 'ArrowLeft' || ev.key === 'ArrowUp') {
    ev.preventDefault();
    selectMood((currentMoodIdx - 1 + MOODS.length) % MOODS.length);
  } else if (ev.key === ' ') {
    ev.preventDefault();
    if (autoplayTimer) {
      clearInterval(autoplayTimer);
      autoplayTimer = null;
    } else {
      autoplayTimer = setInterval(() => {
        selectMood((currentMoodIdx + 1) % MOODS.length);
      }, 2000);
    }
  } else if (ev.key === 'e') {
    // Jump to next emoji mood
    let next = currentMoodIdx;
    for (let j = 0; j < MOODS.length; j++) {
      next = (next + 1) % MOODS.length;
      if (EMOJI_MOODS.has(next)) break;
    }
    selectMood(next);
  }
});

// Start
selectMood(0);
requestAnimationFrame(render);
</script>
